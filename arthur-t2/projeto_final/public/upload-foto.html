<!doctype html>
<html lang="pt-BR">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Upload de Foto - Cloudinary</title>
    <style>
      * {
        margin: 0;
        padding: 0;
        box-sizing: border-box;
      }

      body {
        font-family: "Segoe UI", Tahoma, Geneva, Verdana, sans-serif;
        background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
        min-height: 100vh;
        display: flex;
        justify-content: center;
        align-items: center;
        padding: 20px;
      }

      .container {
        background: white;
        border-radius: 10px;
        box-shadow: 0 20px 60px rgba(0, 0, 0, 0.3);
        padding: 40px;
        max-width: 500px;
        width: 100%;
      }

      h1 {
        color: #333;
        margin-bottom: 10px;
        font-size: 28px;
      }

      .subtitle {
        color: #666;
        margin-bottom: 30px;
        font-size: 14px;
      }

      .upload-area {
        border: 2px dashed #667eea;
        border-radius: 8px;
        padding: 30px;
        text-align: center;
        cursor: pointer;
        transition: all 0.3s ease;
        background: #f8f9ff;
      }

      .upload-area:hover {
        border-color: #764ba2;
        background: #f0f2ff;
      }

      .upload-area.dragover {
        border-color: #764ba2;
        background: #e8ebff;
        transform: scale(1.02);
      }

      .upload-icon {
        font-size: 48px;
        margin-bottom: 15px;
        display: block;
      }

      .upload-text {
        color: #333;
        font-weight: 500;
        margin-bottom: 5px;
      }

      .upload-subtext {
        color: #999;
        font-size: 13px;
      }

      input[type="file"] {
        display: none;
      }

      .file-input-hidden {
        display: none;
      }

      #preview {
        margin-top: 30px;
        display: none;
      }

      #preview img {
        width: 150px;
        height: 150px;
        border-radius: 8px;
        object-fit: cover;
        margin-bottom: 15px;
        box-shadow: 0 4px 15px rgba(0, 0, 0, 0.1);
      }

      .button-group {
        display: flex;
        gap: 10px;
        margin-top: 20px;
      }

      button {
        flex: 1;
        padding: 12px 20px;
        border: none;
        border-radius: 6px;
        font-size: 15px;
        font-weight: 600;
        cursor: pointer;
        transition: all 0.3s ease;
      }

      .btn-upload {
        background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
        color: white;
      }

      .btn-upload:hover:not(:disabled) {
        transform: translateY(-2px);
        box-shadow: 0 8px 20px rgba(102, 126, 234, 0.4);
      }

      .btn-upload:disabled {
        opacity: 0.6;
        cursor: not-allowed;
      }

      .btn-cancel {
        background: #f0f0f0;
        color: #333;
      }

      .btn-cancel:hover {
        background: #e0e0e0;
      }

      .status {
        margin-top: 20px;
        padding: 15px;
        border-radius: 6px;
        display: none;
        font-size: 14px;
      }

      .status.success {
        background: #d4edda;
        color: #155724;
        border: 1px solid #c3e6cb;
        display: block;
      }

      .status.error {
        background: #f8d7da;
        color: #721c24;
        border: 1px solid #f5c6cb;
        display: block;
      }

      .status.loading {
        background: #d1ecf1;
        color: #0c5460;
        border: 1px solid #bee5eb;
        display: block;
      }

      .spinner {
        display: inline-block;
        width: 12px;
        height: 12px;
        border: 2px solid #0c5460;
        border-top-color: transparent;
        border-radius: 50%;
        animation: spin 0.6s linear infinite;
        margin-right: 8px;
      }

      @keyframes spin {
        to {
          transform: rotate(360deg);
        }
      }

      .info-box {
        background: #e8f4f8;
        border-left: 4px solid #667eea;
        padding: 15px;
        border-radius: 4px;
        margin-top: 20px;
        font-size: 13px;
        color: #333;
      }

      .info-box strong {
        display: block;
        margin-bottom: 8px;
      }

      .info-box ul {
        margin-left: 20px;
      }

      .info-box li {
        margin: 4px 0;
      }

      .progress-bar {
        width: 100%;
        height: 4px;
        background: #f0f0f0;
        border-radius: 2px;
        margin-top: 10px;
        overflow: hidden;
      }

      .progress-fill {
        height: 100%;
        background: linear-gradient(90deg, #667eea 0%, #764ba2 100%);
        width: 0%;
        transition: width 0.3s ease;
      }
    </style>
  </head>
  <body>
    <div class="container">
      <h1>📤 Upload de Foto</h1>
      <p class="subtitle">
        Envie uma foto para seu perfil (Powered by Cloudinary)
      </p>

      <div
        class="upload-area"
        id="uploadArea"
        onclick="document.getElementById('fileInput').click()"
      >
        <span class="upload-icon">🖼️</span>
        <div class="upload-text">Clique para selecionar</div>
        <div class="upload-subtext">ou arraste uma imagem aqui</div>
      </div>

      <input
        type="file"
        id="fileInput"
        accept="image/jpeg,image/png,image/gif,image/webp"
      />

      <div id="preview">
        <img id="previewImg" src="" alt="Prévia" />
        <div class="button-group">
          <button class="btn-upload" id="uploadBtn" onclick="uploadFoto()">
            Fazer Upload
          </button>
          <button class="btn-cancel" onclick="cancelarUpload()">
            Cancelar
          </button>
        </div>
        <div id="progressBar" class="progress-bar" style="display: none">
          <div id="progressFill" class="progress-fill"></div>
        </div>
      </div>

      <div id="status" class="status"></div>

      <div class="info-box">
        <strong>ℹ️ Informações:</strong>
        <ul>
          <li>Formatos aceitos: JPG, PNG, GIF, WebP</li>
          <li>Tamanho máximo: 5MB</li>
          <li>A imagem será redimensionada para 500x500px</li>
          <li>Armazenado com segurança no Cloudinary</li>
        </ul>
      </div>
    </div>

    <script>
      const uploadArea = document.getElementById("uploadArea");
      const fileInput = document.getElementById("fileInput");
      const preview = document.getElementById("preview");
      const previewImg = document.getElementById("previewImg");
      const status = document.getElementById("status");
      const uploadBtn = document.getElementById("uploadBtn");
      const progressBar = document.getElementById("progressBar");
      const progressFill = document.getElementById("progressFill");

      let selectedFile = null;

      // Drag and drop
      uploadArea.addEventListener("dragover", (e) => {
        e.preventDefault();
        uploadArea.classList.add("dragover");
      });

      uploadArea.addEventListener("dragleave", () => {
        uploadArea.classList.remove("dragover");
      });

      uploadArea.addEventListener("drop", (e) => {
        e.preventDefault();
        uploadArea.classList.remove("dragover");
        const files = e.dataTransfer.files;
        if (files.length > 0) {
          handleFile(files[0]);
        }
      });

      // File input change
      fileInput.addEventListener("change", (e) => {
        if (e.target.files.length > 0) {
          handleFile(e.target.files[0]);
        }
      });

      function handleFile(file) {
        // Validações
        const allowedTypes = [
          "image/jpeg",
          "image/png",
          "image/gif",
          "image/webp",
        ];
        const maxSize = 5 * 1024 * 1024; // 5MB

        if (!allowedTypes.includes(file.type)) {
          showStatus("Formato inválido. Use JPG, PNG, GIF ou WebP.", "error");
          return;
        }

        if (file.size > maxSize) {
          showStatus("Arquivo muito grande. Máximo 5MB.", "error");
          return;
        }

        selectedFile = file;
        const reader = new FileReader();
        reader.onload = (e) => {
          previewImg.src = e.target.result;
          preview.style.display = "block";
          status.innerHTML = "";
        };
        reader.readAsDataURL(file);
      }

      function uploadFoto() {
        if (!selectedFile) return;

        uploadBtn.disabled = true;
        progressBar.style.display = "block";
        progressFill.style.width = "0%";

        const formData = new FormData();
        formData.append("foto", selectedFile);

        // Simulação de progresso
        let progress = 0;
        const progressInterval = setInterval(() => {
          progress += Math.random() * 30;
          if (progress > 90) progress = 90;
          progressFill.style.width = progress + "%";
        }, 100);

        fetch("/index.php?pagina=api/upload-foto", {
          method: "POST",
          body: formData,
        })
          .then((response) => response.json())
          .then((data) => {
            clearInterval(progressInterval);
            progressFill.style.width = "100%";

            if (data.sucesso) {
              showStatus("✓ Foto enviada com sucesso!", "success");
              console.log("URL da foto:", data.url);
              console.log("Public ID:", data.public_id);
              setTimeout(() => {
                cancelarUpload();
              }, 2000);
            } else {
              showStatus("Erro: " + data.mensagem, "error");
              uploadBtn.disabled = false;
            }
          })
          .catch((error) => {
            clearInterval(progressInterval);
            showStatus("Erro ao fazer upload: " + error.message, "error");
            uploadBtn.disabled = false;
          });
      }

      function cancelarUpload() {
        selectedFile = null;
        fileInput.value = "";
        preview.style.display = "none";
        progressBar.style.display = "none";
        progressFill.style.width = "0%";
        uploadBtn.disabled = false;
        status.innerHTML = "";
      }

      function showStatus(message, type) {
        status.className = "status " + type;
        if (type === "loading") {
          status.innerHTML = '<span class="spinner"></span>' + message;
        } else {
          status.innerHTML = message;
        }
      }
    </script>
  </body>
</html>
